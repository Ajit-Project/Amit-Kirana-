<!-- 1. Replace addCategory() with this -->
<script>
async function addCategory(){
  const name=document.getElementById("newCatName").value.trim();

  if(!name) return;

  if(categories.find(c=>c.name===name)){
    alert("Yeh category pehle se hai!");
    return;
  }

  categories.push({
    name,
    color:selectedColor || "#c2410c"
  });

  document.getElementById("newCatName").value="";

  await saveData();

  renderCatManageList();
  renderCatBar();
  renderItems();

  if(syncCode){
    await pushSync();
  }
}
</script>

<!-- 3. Add safe realtime cleanup -->
<script>
function stopRealtimeSync(){
  if(syncInterval){
    clearInterval(syncInterval);
    syncInterval = null;
  }

  if(sseSource){
    sseSource.close();
    sseSource = null;
  }
}
</script>

<!-- 4. Better unique IDs -->
<script>
function generateUniqueId(){
  return Date.now() + "_" + Math.random().toString(36).slice(2,7);
}
</script>
